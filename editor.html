<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Oferta — Líneas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f0f2f5; font-family:'Nunito',sans-serif; padding:1rem; max-width:480px; margin:0 auto; }
h1 { font-size:1.3rem; color:#0F2540; margin-bottom:1.2rem; font-weight:900; display:flex; align-items:center; gap:0.5rem; }
h1 span { background:#FFD740; padding:2px 10px; border-radius:6px; }
.card { background:#fff; border-radius:16px; padding:1.2rem; margin-bottom:1rem; box-shadow:0 2px 12px rgba(0,0,0,0.07); }
.card-title { font-size:0.65rem; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:#bbb; margin-bottom:0.9rem; }
label { display:block; font-size:0.85rem; font-weight:700; color:#444; margin-bottom:0.3rem; }
input, textarea { width:100%; padding:0.75rem 1rem; border:2px solid #eee; border-radius:10px; font-family:'Nunito',sans-serif; font-size:0.95rem; color:#333; margin-bottom:0.9rem; transition:border 0.2s; }
input:focus, textarea:focus { outline:none; border-color:#FFD740; }
textarea { resize:vertical; min-height:75px; }
.row { display:flex; gap:0.5rem; align-items:flex-start; }
.row .prefix { font-size:1.8rem; font-weight:900; color:#0F2540; padding-top:0.6rem; }
.row input { margin-bottom:0.9rem; }
.dur-btns { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:0.5rem; }
.dur-btn { padding:0.45rem 0.9rem; border:2px solid #eee; border-radius:100px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.82rem; cursor:pointer; background:#fff; color:#666; transition:all 0.15s; }
.dur-btn.on { background:#0F2540; color:#FFD740; border-color:#0F2540; }
.toggle-row { display:flex; align-items:center; gap:0.8rem; }
.tog { position:relative; width:46px; height:25px; flex-shrink:0; }
.tog input { opacity:0; width:0; height:0; }
.tog-sl { position:absolute; inset:0; background:#ddd; border-radius:25px; cursor:pointer; transition:0.25s; }
.tog-sl:before { content:''; position:absolute; width:19px; height:19px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:0.25s; }
input:checked + .tog-sl { background:#25D366; }
input:checked + .tog-sl:before { transform:translateX(21px); }
.tog-lbl { font-size:0.9rem; font-weight:700; color:#333; }
.link-box { background:#f8f9fa; border:2px dashed #ddd; border-radius:12px; padding:1rem; margin-bottom:1rem; word-break:break-all; font-size:0.82rem; color:#555; line-height:1.5; }
.link-box strong { display:block; font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; color:#aaa; margin-bottom:0.3rem; }
.btn-copy { background:#eee; border:none; border-radius:8px; padding:0.4rem 0.9rem; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.8rem; cursor:pointer; margin-top:0.5rem; transition:background 0.2s; }
.btn-copy:hover { background:#FFD740; }
.btn-copy.copied { background:#25D366; color:#fff; }
.btn-ver { width:100%; background:#0F2540; color:#FFD740; font-family:'Nunito',sans-serif; font-weight:900; font-size:1.05rem; padding:0.9rem; border:none; border-radius:100px; cursor:pointer; margin-bottom:0.7rem; transition:all 0.2s; }
.btn-ver:hover { background:#1a3a6e; }
.btn-wa { width:100%; background:#25D366; color:#fff; font-family:'Nunito',sans-serif; font-weight:900; font-size:1.05rem; padding:0.9rem; border:none; border-radius:100px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:0.5rem; }
.btn-wa:hover { background:#1db954; }
</style>
</head>
<body>

<h1><span>✏️</span> Editor de Oferta</h1>

<!-- ESTADO -->
<div class="card">
  <div class="card-title">Estado</div>
  <div class="toggle-row">
    <label class="tog"><input type="checkbox" id="activa" checked><span class="tog-sl"></span></label>
    <span class="tog-lbl" id="estadoLbl">Oferta ACTIVA ✅</span>
  </div>
</div>

<!-- CONTENIDO -->
<div class="card">
  <div class="card-title">Contenido de la oferta</div>
  <label>Servicio</label>
  <input id="servicio" type="text" placeholder="ej: Fotocopias, Anillados, Impresiones color...">
  <label>Precio especial</label>
  <div class="row"><span class="prefix">$</span><input id="precio" type="number" placeholder="ej: 60"></div>
  <label>Descripción</label>
  <textarea id="desc" placeholder="ej: Válido hoy. Mandá tus archivos por WhatsApp y pasá a retirar."></textarea>
  <label>URL de imagen (opcional)</label>
  <input id="img" type="url" placeholder="https://... pegá el link de tu foto">
</div>

<!-- DURACIÓN -->
<div class="card">
  <div class="card-title">Duración</div>
  <div class="dur-btns">
    <button class="dur-btn on" onclick="setDur(this,6)">6 hs</button>
    <button class="dur-btn" onclick="setDur(this,12)">12 hs</button>
    <button class="dur-btn" onclick="setDur(this,24)">24 hs</button>
    <button class="dur-btn" onclick="setDur(this,48)">2 días</button>
    <button class="dur-btn" onclick="setDur(this,168)">1 semana</button>
  </div>
</div>

<!-- LINK GENERADO -->
<div class="card">
  <div class="card-title">Link para compartir</div>
  <div class="link-box" id="linkBox">
    <strong>Tu link de oferta</strong>
    <span id="linkText">Completá los datos para generar el link</span>
  </div>
  <button class="btn-copy" id="btnCopy" onclick="copiarLink()">📋 Copiar link</button>
</div>

<button class="btn-ver" onclick="verOferta()">👁️ Ver oferta</button>
<button class="btn-wa" onclick="compartirWA()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.555 4.126 1.526 5.858L0 24l6.335-1.502A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.007-1.371l-.36-.214-3.727.977.994-3.634-.235-.374A9.818 9.818 0 1112 21.818z"/></svg>
  Compartir por WhatsApp
</button>

<script>
const BASE = 'https://lineas-oferta.netlify.app/oferta.html';
let durHoras = 6;

function setDur(btn, h) {
  document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  durHoras = h;
  genLink();
}

document.getElementById('activa').addEventListener('change', function() {
  document.getElementById('estadoLbl').textContent = this.checked ? 'Oferta ACTIVA ✅' : 'Oferta PAUSADA ⏸';
  genLink();
});

['servicio','precio','desc','img'].forEach(id => {
  document.getElementById(id).addEventListener('input', genLink);
});

function genLink() {
  const svc = document.getElementById('servicio').value.trim();
  const pre = document.getElementById('precio').value.trim();
  const desc = document.getElementById('desc').value.trim();
  const img = document.getElementById('img').value.trim();
  const activa = document.getElementById('activa').checked ? '1' : '0';
  if (!svc && !pre) { document.getElementById('linkText').textContent = 'Completá los datos para generar el link'; return; }
  const params = new URLSearchParams();
  if (svc) params.set('titulo', svc);
  if (pre) params.set('precio', pre);
  if (desc) params.set('desc', desc);
  if (img) params.set('img', img);
  params.set('hs', durHoras);
  params.set('activa', activa);
  const link = BASE + '?' + params.toString();
  document.getElementById('linkText').textContent = link;
}

function getLink() { return document.getElementById('linkText').textContent; }

function copiarLink() {
  const link = getLink();
  if (link.startsWith('Completá')) return;
  navigator.clipboard.writeText(link).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✅ Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copiar link'; btn.classList.remove('copied'); }, 2000);
  });
}

function verOferta() {
  const link = getLink();
  if (link.startsWith('Completá')) { alert('Completá el servicio y precio primero'); return; }
  window.open(link, '_blank');
}

function compartirWA() {
  const link = getLink();
  if (link.startsWith('Completá')) { alert('Completá el servicio y precio primero'); return; }
  const svc = document.getElementById('servicio').value || 'Oferta';
  const pre = document.getElementById('precio').value || '';
  const msg = '🔥 *OFERTA DEL DÍA — Líneas Fotocopias*\n' + svc + (pre ? ' a $' + pre : '') + ' ⏳\n👉 ' + link;
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

genLink();
</script>
</body>
</html>
